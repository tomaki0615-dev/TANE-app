<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>種子島の見どころ</title>

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

.tabs{
  display:flex;
  position:fixed;
  top:44px;
  width:100%;
  background:white;
  border-bottom:1px solid #ddd;
  z-index:999;
}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  background:#3b82f6;
  color:white;
}

.container{ padding:110px 10px 20px; }

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

button{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
  cursor:pointer;
}

.row{ display:flex; gap:8px; margin-bottom:10px; }
.row button{ flex:1; }

.tag-btn{
  padding:10px 14px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
  cursor:pointer;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

.card{
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img{
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.page{ display:none; }
.page.active{ display:block; }

#andBtn.on,
#favBtn.on{
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<header>🌴 種子島の見どころ</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">検索</div>
  <div class="tab" onclick="switchTab('add')">追加</div>
</div>

<div class="container">

<!-- 検索 -->
<div id="searchPage" class="page active">

  <input id="search" placeholder="検索">

  <div class="row">
    <button id="andBtn" onclick="toggleAnd()">AND</button>
    <button id="favBtn" onclick="toggleFav()">お気に入り</button>
    <button onclick="exportData()">Export</button>
  </div>

  <div id="filter-area"></div>
  <div id="filter-type"></div>

  <div id="spot-list"></div>
</div>

<!-- 追加 -->
<div id="addPage" class="page">

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <div id="area-buttons"></div>
  <div id="type-buttons"></div>

  <input type="file" id="image">
  <img id="preview" style="display:none;width:100%;border-radius:10px;">

  <button onclick="save()">保存</button>

</div>

</div>

<script>

const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","土産","個人商店","無人販売","レジャー","温泉","神社","工場","博物館","公園","海岸","星空","絶景","猫","知人友人・親戚","その他"];

const $ = id => document.getElementById(id);

let state={
  spots: JSON.parse(localStorage.getItem("spots"))||[],
  fav: JSON.parse(localStorage.getItem("fav"))||[],
  edit:null,

  form:{area:"",types:[],img:""},
  filter:{k:"",and:true,fav:false}
};

init();

function init(){
  bind();
  makeButtons();
  render();
}

/* tab */
function switchTab(t){
  document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));

  if(t==="search"){
    $("searchPage").classList.add("active");
    document.querySelectorAll(".tab")[0].classList.add("active");
  }else{
    $("addPage").classList.add("active");
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
}

/* bind */
function bind(){
  $("search").oninput=e=>{
    state.filter.k=e.target.value;
    render();
  };

  $("image").onchange=e=>{
    const f=e.target.files[0];
    if(!f) return;

    const r=new FileReader();
    r.onload=()=>{
      state.form.img=r.result;
      $("preview").src=r.result;
      $("preview").style.display="block";
    };
    r.readAsDataURL(f);
  };
}

/* buttons */
function makeButtons(){
  make("area-buttons",AREAS,"area");
  make("type-buttons",TYPES,"type");
}

function make(id,list,type){
  const t=$(id);
  list.forEach(v=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.textContent=v;
    b.onclick=()=>tag(type,v);
    t.appendChild(b);
  });
}

/* tag */
function tag(type,v){
  if(type==="area"){
    state.form.area = state.form.area===v?"":v;
  }
  if(type==="type"){
    state.form.types.includes(v)
      ? state.form.types=state.form.types.filter(x=>x!==v)
      : state.form.types.push(v);
  }
  render();
}

/* save */
function save(){
  const data={
    id:Date.now(),
    name:$("name").value,
    desc:$("desc").value,
    area:state.form.area,
    types:state.form.types,
    img:state.form.img
  };

  state.spots.push(data);
  localStorage.setItem("spots",JSON.stringify(state.spots));

  state.form={area:"",types:[],img:""};

  $("name").value="";
  $("desc").value="";
  $("preview").style.display="none";

  switchTab("search");
  render();
}

/* fav */
function toggleFavFilter(){
  state.filter.fav=!state.filter.fav;
  render();
}

function fav(id){
  state.fav.includes(id)
    ? state.fav=state.fav.filter(x=>x!==id)
    : state.fav.push(id);

  localStorage.setItem("fav",JSON.stringify(state.fav));
  render();
}

function isFav(id){ return state.fav.includes(id); }

/* filter */
function filtered(){
  return state.spots.filter(s=>{
    if(state.filter.fav && !isFav(s.id)) return false;
    if(state.filter.k && !s.name.includes(state.filter.k)) return false;
    return true;
  });
}

/* render */
function render(){
  const box=$("spot-list");
  box.innerHTML="";

  filtered().forEach(s=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div>
        <h3>${s.name}
          <button onclick="fav(${s.id})">
            ${isFav(s.id)?"⭐":"☆"}
          </button>
        </h3>

        <div>${s.desc}</div>
        <small>${s.area} ${s.types.join(", ")}</small>
      </div>
    `;

    box.appendChild(div);
  });
}

/* AND */
function toggleAnd(){
  state.filter.and=!state.filter.and;
}

/* export */
function exportData(){
  const blob=new Blob(
    [JSON.stringify(state.spots,null,2)],
    {type:"application/json"}
  );

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="spots.json";
  a.click();
}

</script>

</body>
</html>
