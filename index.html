<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>種子島ガイド</title>

<style>
body { font-family:sans-serif; margin:0; background:#f2f4f7; }

header {
  background:#0f172a;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:15px;
  max-width:600px;
  margin:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:4px;
  cursor:pointer;
}

.tag-btn {
  display:inline-block;
  padding:6px 10px;
  margin:4px;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
  font-size:12px;
}

.tag-btn.active {
  background:#2563eb;
  color:white;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<!-- 検索 -->
<input type="text" id="search" placeholder="検索...">

<!-- フィルター -->
<div>
  <div>エリア</div>
  <div id="filter-area"></div>

  <div>種類タグ</div>
  <div id="filter-type"></div>

  <button onclick="toggleFavFilter()">⭐ お気に入りだけ</button>
  <button onclick="toggleMode()">AND / OR 切替</button>
</div>

<hr>

<div id="spot-list"></div>

</div>

<script>
// ===== 定義 =====
const AREAS = ["北部","中部","南部"];
const TYPES = ["カフェ","レストラン","パン","ホテル","スーパー","ドラッグストア","コンビニ","土産","個人商店","無人販売","港","空港","レンタカー","レジャー","温泉","神社","工場","家畜","公園","海岸","星空","宇宙","博物館","絶景","猫","知人友人・親戚","その他"];

// ===== 状態 =====
let spots = JSON.parse(localStorage.getItem("spots")) || [];
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

let filterArea = "";
let filterTypes = [];
let showFavOnly = false;
let isAndMode = true;

// ===== UI生成 =====
const areaBox = document.getElementById("filter-area");
const typeBox = document.getElementById("filter-type");

AREAS.forEach(a=>{
  const btn=document.createElement("span");
  btn.className="tag-btn";
  btn.innerText=a;

  btn.onclick=()=>{
    filterArea = filterArea===a ? "" : a;
    renderButtons();
    render();
  };

  areaBox.appendChild(btn);
});

TYPES.forEach(t=>{
  const btn=document.createElement("span");
  btn.className="tag-btn";
  btn.innerText=t;

  btn.onclick=()=>{
    filterTypes.includes(t)
      ? filterTypes=filterTypes.filter(x=>x!==t)
      : filterTypes.push(t);

    renderButtons();
    render();
  };

  typeBox.appendChild(btn);
});

function renderButtons(){
  document.querySelectorAll("#filter-area .tag-btn")
    .forEach(btn=>btn.classList.toggle("active",btn.innerText===filterArea));

  document.querySelectorAll("#filter-type .tag-btn")
    .forEach(btn=>btn.classList.toggle("active",filterTypes.includes(btn.innerText)));
}

// ===== トグル =====
function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  render();
}

function toggleMode(){
  isAndMode=!isAndMode;
  alert(isAndMode ? "AND検索" : "OR検索");
  render();
}

// ===== 表示 =====
function render(){
  const keyword = search.value.toLowerCase();
  const list = document.getElementById("spot-list");
  list.innerHTML="";

  spots
    .filter(s=>{
      // 検索
      if (!s.name.toLowerCase().includes(keyword)) return false;

      // エリア
      if (filterArea && !s.tags.includes(filterArea)) return false;

      // お気に入り
      if (showFavOnly && !favorites.includes(s.name)) return false;

      // タグ
      if (filterTypes.length){
        if (isAndMode){
          if (!filterTypes.every(t=>s.tags.includes(t))) return false;
        } else {
          if (!filterTypes.some(t=>s.tags.includes(t))) return false;
        }
      }

      return true;
    })
    .forEach((s,i)=>{
      const fav = favorites.includes(s.name);

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <h3>${s.name}</h3>
        <div>${s.tags.join(", ")}</div>

        <button onclick="toggleFavorite('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      `;

      list.appendChild(div);
    });
}

// ===== お気に入り =====
function toggleFavorite(name){
  favorites.includes(name)
    ? favorites=favorites.filter(f=>f!==name)
    : favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

// 初期化
renderButtons();
render();
</script>

</body>
</html>
