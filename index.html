<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>種子島ガイド</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f2f4f7;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary { background:#2563eb; color:white; }
.secondary { background:#e5e7eb; }
.danger { background:#ef4444; color:white; }

.card {
  background:white;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 8px;
}

.tag {
  display:inline-block;
  padding:4px 10px;
  margin:3px;
  border-radius:20px;
  font-size:12px;
  background:#e5e7eb;
}

.area-北部 { background:#3b82f6; color:white; }
.area-中部 { background:#f59e0b; color:white; }
.area-南部 { background:#ef4444; color:white; }

.form-box {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<input type="text" id="search" placeholder="検索...">

<div class="form-box">
  <h3>➕ スポット追加 / 編集</h3>
  <input id="name" placeholder="名前">
  <input id="tags" placeholder="タグ（例：絶景,海,南部）">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image" accept="image/*">

  <img id="preview" style="display:none;">

  <button class="primary" onclick="saveSpot()">保存</button>
</div>

<button class="secondary" onclick="exportData()">📤 データ書き出し</button>

<div id="spot-list"></div>

</div>

<script>
let spots = JSON.parse(localStorage.getItem("spots")) || [];
let editTarget = null;
let imageData = "";

// ===== 画像プレビュー =====
document.getElementById("image").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function() {
    imageData = reader.result;
    const preview = document.getElementById("preview");
    preview.src = imageData;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
});

// ===== 保存 =====
function saveAll() {
  localStorage.setItem("spots", JSON.stringify(spots));
}

function saveSpot() {
  const name = nameInput.value.trim();
  const tags = tagsInput.value.split(",").map(t=>t.trim());
  const desc = descInput.value;

  if (!name) return alert("名前必須");

  if (editTarget) {
    editTarget.name = name;
    editTarget.tags = tags;
    editTarget.desc = desc;
    if (imageData) editTarget.img = imageData;
    editTarget = null;
  } else {
    spots.push({ name, tags, desc, img:imageData });
  }

  saveAll();
  clearForm();
  render();
}

function editSpot(i) {
  const s = spots[i];
  editTarget = s;

  nameInput.value = s.name;
  tagsInput.value = s.tags.join(",");
  descInput.value = s.desc;
  imageData = s.img || "";

  if (s.img) {
    preview.src = s.img;
    preview.style.display = "block";
  }
}

function deleteSpot(i) {
  if (!confirm("削除する？")) return;
  spots.splice(i,1);
  saveAll();
  render();
}

function clearForm() {
  nameInput.value="";
  tagsInput.value="";
  descInput.value="";
  image.value="";
  preview.style.display="none";
  imageData="";
}

// ===== 表示 =====
function render() {
  const keyword = search.value.toLowerCase();
  const list = document.getElementById("spot-list");
  list.innerHTML = "";

  spots
    .filter(s=>s.name.toLowerCase().includes(keyword))
    .forEach((s,i)=>{
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${s.img ? `<img src="${s.img}">` : ""}

        <h2>${s.name}</h2>
        <div>${s.desc || ""}</div>

        <div>
          ${s.tags.map(t=>{
            const cls = ["北部","中部","南部"].includes(t) ? "area-"+t : "";
            return `<span class="tag ${cls}">${t}</span>`;
          }).join("")}
        </div>

        <button onclick="editSpot(${i})">✏️ 編集</button>
        <button class="danger" onclick="deleteSpot(${i})">🗑 削除</button>
      `;

      list.appendChild(div);
    });
}

// ===== エクスポート =====
function exportData() {
  const text = JSON.stringify(spots,null,2);
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

search.addEventListener("input", render);

// 初期化
const nameInput = document.getElementById("name");
const tagsInput = document.getElementById("tags");
const descInput = document.getElementById("desc");
const image = document.getElementById("image");
const preview = document.getElementById("preview");

render();
</script>

</body>
</html>
