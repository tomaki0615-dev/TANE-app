<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>種子島ガイド</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f2f4f7;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary { background:#2563eb; color:white; }
.secondary { background:#e5e7eb; }
.danger { background:#ef4444; color:white; }

/* 通知 */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #16a34a;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  display: none;
}

/* 編集中 */
.editing {
  background: #fef3c7;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 13px;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
}

img {
  width:100%;
  border-radius:10px;
  margin-bottom:8px;
}

.tag {
  display:inline-block;
  padding:4px 10px;
  margin:3px;
  border-radius:20px;
  font-size:12px;
  background:#e5e7eb;
}

.area-北部 { background:#3b82f6; color:white; }
.area-中部 { background:#f59e0b; color:white; }
.area-南部 { background:#ef4444; color:white; }

.form-box {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<input type="text" id="search" placeholder="検索...">

<div id="editingLabel" class="editing" style="display:none;"></div>

<div class="form-box">
  <h3>➕ スポット追加 / 編集</h3>
  <input id="name" placeholder="名前">
  <input id="tags" placeholder="タグ（例：絶景,海,南部）">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image" accept="image/*">
  <img id="preview" style="display:none;">

  <button class="primary" onclick="saveSpot()">保存</button>
</div>

<button class="secondary" onclick="exportData()">📤 データ書き出し</button>

<div id="spot-list"></div>

</div>

<div id="toast" class="toast">保存しました！</div>

<script>
let spots = JSON.parse(localStorage.getItem("spots")) || [];
let editIndex = null;
let imageData = "";

const nameInput = document.getElementById("name");
const tagsInput = document.getElementById("tags");
const descInput = document.getElementById("desc");
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");
const editingLabel = document.getElementById("editingLabel");

// ===== トースト =====
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 1500);
}

// ===== 画像 =====
imageInput.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function() {
    imageData = reader.result;
    preview.src = imageData;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
});

// ===== 保存 =====
function saveAll() {
  localStorage.setItem("spots", JSON.stringify(spots));
}

function saveSpot() {
  const name = nameInput.value.trim();
  const tags = tagsInput.value.split(",").map(t=>t.trim());
  const desc = descInput.value;

  if (!name) return alert("名前必須");

  const newData = { name, tags, desc, img: imageData };

  if (editIndex !== null) {
    if (!imageData) newData.img = spots[editIndex].img;
    spots[editIndex] = newData;
  } else {
    spots.push(newData);
  }

  saveAll();
  clearForm();
  render();
  showToast("保存しました！");
}

// ===== 編集 =====
function editSpot(i) {
  const s = spots[i];
  editIndex = i;

  nameInput.value = s.name;
  tagsInput.value = s.tags.join(",");
  descInput.value = s.desc;

  imageData = s.img || "";

  if (s.img) {
    preview.src = s.img;
    preview.style.display = "block";
  }

  editingLabel.innerText = "✏️ 編集中: " + s.name;
  editingLabel.style.display = "block";
}

function deleteSpot(i) {
  if (!confirm("削除する？")) return;
  spots.splice(i,1);
  saveAll();
  render();
  showToast("削除しました");
}

function clearForm() {
  nameInput.value="";
  tagsInput.value="";
  descInput.value="";
  imageInput.value="";
  preview.style.display="none";
  imageData="";
  editIndex=null;

  editingLabel.style.display = "none";
}

// ===== 表示 =====
function render() {
  const keyword = search.value.toLowerCase();
  const list = document.getElementById("spot-list");
  list.innerHTML = "";

  spots
    .filter(s=>s.name.toLowerCase().includes(keyword))
    .forEach((s,i)=>{
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${s.img ? `<img src="${s.img}">` : ""}
        <h2>${s.name}</h2>
        <div>${s.desc || ""}</div>

        <div>
          ${s.tags.map(t=>{
            const cls = ["北部","中部","南部"].includes(t) ? "area-"+t : "";
            return `<span class="tag ${cls}">${t}</span>`;
          }).join("")}
        </div>

        <button onclick="editSpot(${i})">✏️ 編集</button>
        <button class="danger" onclick="deleteSpot(${i})">🗑 削除</button>
      `;

      list.appendChild(div);
    });
}

// ===== エクスポート =====
function exportData() {
  const text = JSON.stringify(spots,null,2);
  navigator.clipboard.writeText(text);
  showToast("コピーしました");
}

search.addEventListener("input", render);

render();
</script>

</body>
</html>
