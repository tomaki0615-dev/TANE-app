<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>種子島スポット</title>

<style>
body{font-family:-apple-system; margin:0; background:#f9fafb;}
header{position:fixed;top:0;width:100%;padding:10px;text-align:center;background:#fff;border-bottom:1px solid #ddd;z-index:1000;}
.container{padding:100px 10px;}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
button{padding:8px 10px;border:0;border-radius:8px;cursor:pointer;}
.delete{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<header>🌴 種子島スポット</header>

<div class="container">

<input id="name" placeholder="名前">
<textarea id="desc" placeholder="説明"></textarea>
<button onclick="add()">追加</button>

<div id="list"></div>

</div>

<script>

let spots = JSON.parse(localStorage.getItem("spots")) || [];

function save(){
  localStorage.setItem("spots",JSON.stringify(spots));
}

function add(){
  const name=document.getElementById("name").value;
  const desc=document.getElementById("desc").value;

  if(!name) return alert("名前入れて");

  spots.push({
    id:Date.now(),   // ←これが超重要（安定ID）
    name,
    desc
  });

  save();
  render();
}

function remove(id){
  spots = spots.filter(s=>s.id!==id);
  save();
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  spots.forEach(s=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div><b>${s.name}</b><br>${s.desc||""}</div>
      <button class="delete" onclick="remove(${s.id})">削除</button>
    `;

    list.appendChild(div);
  });
}

render();

</script>

</body>
</html>
