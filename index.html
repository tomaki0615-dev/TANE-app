<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>種子島ガイド</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

/* ヘッダー */
header {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:14px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

/* コンテンツ */
.container {
  padding:70px 10px 90px;
}

/* 入力 */
input, textarea {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

/* ボタン */
button {
  padding:14px;
  border-radius:14px;
  border:none;
  background:#e5e7eb;
  font-size:16px;
}

/* 横ボタン */
.row-btn {
  display:flex;
  gap:8px;
}

.row-btn button {
  flex:1;
}

/* タグ */
.tag-btn {
  padding:8px 12px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
}

.tag-btn.active {
  background:#3b82f6;
  color:white;
}

/* カード */
.card {
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img {
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.card-content h3 {
  margin:0;
  font-size:18px;
}

/* 折りたたみ */
.toggle-btn {
  width:100%;
  background:#3b82f6;
  color:white;
}

.form-box {
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}

/* 下バー */
.bottom-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top:1px solid #ddd;
  display:flex;
}

.bottom-bar button {
  flex:1;
  background:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<button class="toggle-btn" onclick="toggleForm()">➕ スポット追加</button>

<div id="formBox" class="form-box">
  <div id="area-buttons"></div>
  <div id="type-buttons"></div>

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image">
  <img id="preview" style="display:none; width:100%;">

  <button onclick="saveSpot()">保存</button>
</div>

<input id="search" placeholder="検索">

<div class="row-btn">
  <button onclick="toggleFav()">⭐</button>
  <button onclick="toggleMode()">AND/OR</button>
</div>

<div id="filter-area"></div>
<div id="filter-type"></div>

<div id="spot-list"></div>

</div>

<div class="bottom-bar">
  <button onclick="exportData()">📤</button>
</div>

<script>
const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","温泉","海岸","絶景","その他"];

let spots=JSON.parse(localStorage.getItem("spots"))||[];
let favorites=JSON.parse(localStorage.getItem("fav"))||[];

let selectedArea="", selectedTypes=[];
let filterArea="", filterTypes=[];
let showFav=false, isAnd=true;
let imageData="";

const areaEl=document.getElementById("area-buttons");
const typeEl=document.getElementById("type-buttons");
const fArea=document.getElementById("filter-area");
const fType=document.getElementById("filter-type");

function createButtons(target,list,cb){
  list.forEach(i=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.innerText=i;
    b.onclick=()=>cb(i);
    target.appendChild(b);
  });
}

createButtons(areaEl,AREAS,a=>{selectedArea=a});
createButtons(typeEl,TYPES,t=>{selectedTypes.push(t)});
createButtons(fArea,AREAS,a=>{filterArea=a;render()});
createButtons(fType,TYPES,t=>{filterTypes.push(t);render()});

function toggleForm(){
  formBox.style.display=formBox.style.display==="none"?"block":"none";
}

image.onchange=e=>{
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=()=>{imageData=r.result;preview.src=r.result;preview.style.display="block";}
  r.readAsDataURL(f);
}

function saveSpot(){
  spots.push({
    name:name.value,
    desc:desc.value,
    tags:[selectedArea,...selectedTypes],
    img:imageData
  });
  localStorage.setItem("spots",JSON.stringify(spots));
  render();
}

function render(){
  spot-list.innerHTML="";
  spots.forEach(s=>{
    if(showFav && !favorites.includes(s.name)) return;

    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div class="card-content">
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <button onclick="fav('${s.name}')">${favorites.includes(s.name)?"⭐":"☆"}</button>
      </div>`;
    document.getElementById("spot-list").appendChild(d);
  });
}

function fav(n){
  favorites.includes(n)
  ? favorites=favorites.filter(x=>x!==n)
  : favorites.push(n);
  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

function toggleFav(){showFav=!showFav;render();}
function toggleMode(){isAnd=!isAnd;}
function exportData(){
  navigator.clipboard.writeText(JSON.stringify(spots));
  alert("コピーしたよ");
}

search.oninput=render;
render();
</script>

</body>
</html>
