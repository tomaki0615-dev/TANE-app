body{

}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  border-bottom:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

.tabs{
  display:flex;
  position:fixed;
  top:44px;
  width:100%;
  background:white;
  border-bottom:1px solid #ddd;
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
}

.tab.active{
  background:#3b82f6;
  color:white;
}

.container{
  padding:100px 10px 20px;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

button{
  padding:8px;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
}

.row{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.row button{ flex:1; }

.tag-btn{
  padding:8px 12px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

.card{
  display:flex;
  gap:8px;
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
}

.card img{
  width:90px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.page{ display:none; }
.page.active{ display:block; }

.on{
  background:#3b82f6 !important;
  color:white !important;
}

/* モーダル */
#modal{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top:1px solid #ddd;
  padding:20px;
  display:none;
  z-index:2000;
}
</style>
</head>

<body>

<header>🌴 種子島の見どころ</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">検索</div>
  <div class="tab" onclick="switchTab('add')">追加</div>
</div>

<div class="container">

<!-- 検索 -->
<div id="searchPage" class="page active">

  <input id="search" placeholder="検索">

  <div class="row">
    <button id="andBtn" onclick="toggleAnd()">AND</button>
    <button id="favBtn" onclick="toggleFavFilter()">お気に入り</button>
  </div>

  <div>
    <div>エリア</div>
    <div id="filter-area"></div>

    <div>種類タグ</div>
    <div id="filter-type"></div>
  </div>

  <div id="spot-list"></div>
</div>

<!-- 追加 -->
<div id="addPage" class="page">

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <div>エリア</div>
  <div id="area-buttons"></div>

  <div>種類タグ</div>
  <div id="type-buttons"></div>

  <input type="file" id="image">
  <img id="preview" style="display:none;width:100%;border-radius:10px;">

  <button onclick="saveSpot()">保存</button>

</div>

</div>

<!-- 長押しメニュー -->
<div id="modal">
  <button onclick="edit(selectedIndex)">編集</button>
  <button onclick="del(selectedIndex)">削除</button>
  <button onclick="closeModal()">キャンセル</button>
</div>

        ]
      },

    },
    {

      "desc": "行ってみたい",
      "tags": {
        "area": "北部",
        "types": [
          "絶景",
          "その他"
        ]
      },
      "img": ""
    }
  ],
  fav: [

const state={
  spots: JSON.parse(localStorage.getItem("spots")) || [],
  fav: JSON.parse(localStorage.getItem("fav")) || [],
  form:{ area:"", types:[], image:"" },
  filter:{
    keyword:"",
    area:"",
    types:[],
    and:true,
    favOnly:false
  }
};

const searchEl=el("search");
const nameEl=el("name");
const descEl=el("desc");
const imageEl=el("image");
const previewEl=el("preview");

const spotList=el("spot-list");
const andBtn=el("andBtn");
const favBtn=el("favBtn");

init();

function init(){
  bind();
  createButtons();
  render();
}

/* タブ */
function switchTab(t){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(t==="search"){
    el("searchPage").classList.add("active");
    document.querySelectorAll(".tab")[0].classList.add("active");
  }else{
    el("addPage").classList.add("active");
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
}

/* イベント */
function bind(){
  searchEl.oninput=e=>{
    state.filter.keyword=e.target.value;
    render();
  };

  imageEl.onchange=e=>{
    const f=e.target.files[0];
    if(!f) return;

    const r=new FileReader();
    r.onload=()=>{
      state.form.image=r.result;
      previewEl.src=r.result;
      previewEl.style.display="block";
    };
    r.readAsDataURL(f);
  };
}

/* タグ生成 */
function createButtons(){
  make("area-buttons",AREAS,"area");
  make("type-buttons",TYPES,"type");
  make("filter-area",AREAS,"farea");
  make("filter-type",TYPES,"ftype");
}

function make(id,list,type){
  const t=el(id);
  list.forEach(x=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.innerText=x;
    b.onclick=()=>tag(type,x);
    t.appendChild(b);
  });
}

/* タグ */
function tag(type,val){

  if(type==="area") state.form.area = state.form.area===val?"":val;

  if(type==="type"){
    state.form.types.includes(val)
      ? state.form.types=state.form.types.filter(t=>t!==val)
      : state.form.types.push(val);
  }

  if(type==="farea") state.filter.area = state.filter.area===val?"":val;

  if(type==="ftype"){
    state.filter.types.includes(val)
      ? state.filter.types=state.filter.types.filter(t=>t!==val)
      : state.filter.types.push(val);
  }

  render();
}

/* 保存 */
function saveSpot(){

  const data={
    name:nameEl.value,
    desc:descEl.value,
    tags:{ area:state.form.area, types:state.form.types },
    img:state.form.image
  };

  if(editIndex!==null){
    state.spots[editIndex]=data;
    editIndex=null;
  }else{
    state.spots.push(data);
  }

  localStorage.setItem("spots",JSON.stringify(state.spots));

  resetForm();
  switchTab("search");
  render();
}

/* 長押し */
function attachLongPress(elm,i){
  elm.ontouchstart=()=>{
    pressTimer=setTimeout(()=>{
      selectedIndex=i;
      openModal();
    },500);
  };
  elm.ontouchend=()=>clearTimeout(pressTimer);
  elm.ontouchmove=()=>clearTimeout(pressTimer);
}

/* 描画 */
function render(){

  spotList.innerHTML="";

  const list = state.spots.filter(s=>{
    if(state.filter.favOnly && !state.fav.includes(s.name)) return false;

    if(state.filter.keyword &&
      !s.name.toLowerCase().includes(state.filter.keyword.toLowerCase())) return false;

    if(state.filter.area && s.tags?.area!==state.filter.area) return false;

    if(state.filter.types.length){
      const t=s.tags?.types||[];
      if(state.filter.and){
        if(!state.filter.types.every(x=>t.includes(x))) return false;
      }else{
        if(!state.filter.types.some(x=>t.includes(x))) return false;
      }
    }

    return true;
  });

  list.forEach((s,i)=>{

    const d=document.createElement("div");
    d.className="card";

    attachLongPress(d,i);

    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div>
        <strong>${s.name}</strong>
        <button onclick="fav('${s.name}')">
          ${state.fav.includes(s.name)?"⭐":"☆"}
        </button>
        <div>${s.desc||""}</div>
        <div style="font-size:12px;color:#666;">
          ${s.tags?.area||""} ${(s.tags?.types||[]).join(", ")}
        </div>
      </div>
    `;

    spotList.appendChild(d);
  });

  updateUI();
}

/* UI */
function updateUI(){
  andBtn.classList.toggle("on",state.filter.and);
  favBtn.classList.toggle("on",state.filter.favOnly);

  document.querySelectorAll("#area-buttons .tag-btn, #type-buttons .tag-btn").forEach(b=>{
    const t=b.innerText;
    b.classList.toggle("active",
      t===state.form.area || state.form.types.includes(t)
    );
  });

  document.querySelectorAll("#filter-area .tag-btn, #filter-type .tag-btn").forEach(b=>{
    const t=b.innerText;
    b.classList.toggle("active",
      t===state.filter.area || state.filter.types.includes(t)
    );
  });
}

/* その他 */
function fav(name){
  state.fav.includes(name)
    ? state.fav=state.fav.filter(f=>f!==name)
    : state.fav.push(name);

  localStorage.setItem("fav",JSON.stringify(state.fav));
  render();
}

function edit(i){
  const s=state.spots[i];
  editIndex=i;

  nameEl.value=s.name;
  descEl.value=s.desc;
  state.form.area=s.tags?.area||"";
  state.form.types=s.tags?.types||[];
  state.form.image=s.img||"";

  if(s.img){
    previewEl.src=s.img;
    previewEl.style.display="block";
  }

  closeModal();
  switchTab("add");
}

function del(i){
  if(!confirm("削除する？")) return;

  const s=state.spots[i];
  state.spots.splice(i,1);
  state.fav=state.fav.filter(f=>f!==s.name);

  localStorage.setItem("spots",JSON.stringify(state.spots));
  localStorage.setItem("fav",JSON.stringify(state.fav));

  closeModal();
  render();
}

function toggleAnd(){ state.filter.and=!state.filter.and; render(); }
function toggleFavFilter(){ state.filter.favOnly=!state.filter.favOnly; render(); }

function openModal(){ el("modal").style.display="block"; }
function closeModal(){ el("modal").style.display="none"; }

function resetForm(){
  nameEl.value="";
  descEl.value="";
  state.form.area="";
  state.form.types=[];
  state.form.image="";
  previewEl.style.display="none";
}

</script>
