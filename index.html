<script>
const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","土産","個人商店","無人販売","レジャー","温泉","神社","工場","博物館","公園","海岸","星空","絶景","猫","知人友人・親戚","その他"];

const $ = id => document.getElementById(id);

let state={
  spots: JSON.parse(localStorage.getItem("spots")||"[]"),
  fav: JSON.parse(localStorage.getItem("fav")||"[]"),
  form:{area:"",types:[],img:""},
  filter:{k:"",fav:false}
};

init();

function init(){
  bind();
  safeMake();
  render();
}

/* 🔐 安全DOM生成 */
function safeMake(){

  const areaBox=$("area-buttons");
  const typeBox=$("type-buttons");

  if(areaBox) make(areaBox,AREAS,"area");
  if(typeBox) make(typeBox,TYPES,"type");
}

/* ボタン生成 */
function make(target,list,type){

  target.innerHTML="";

  list.forEach(v=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.textContent=v;
    b.onclick=()=>tag(type,v);
    target.appendChild(b);
  });
}

/* タグ */
function tag(type,v){
  if(type==="area"){
    state.form.area = state.form.area===v?"":v;
  }

  if(type==="type"){
    state.form.types.includes(v)
      ? state.form.types=state.form.types.filter(x=>x!==v)
      : state.form.types.push(v);
  }

  render();
}

/* 保存 */
function save(){
  const name=document.getElementById("name");
  const desc=document.getElementById("desc");

  state.spots.push({
    id:Date.now(),
    name:name?.value||"",
    desc:desc?.value||"",
    area:state.form.area,
    types:state.form.types,
    img:state.form.img
  });

  localStorage.setItem("spots",JSON.stringify(state.spots));

  state.form={area:"",types:[],img:""};

  if(name) name.value="";
  if(desc) desc.value="";

  render();
}

/* フィルター */
function filtered(){
  return state.spots.filter(s=>{
    if(state.filter.k && !s.name.includes(state.filter.k)) return false;
    return true;
  });
}

/* 描画 */
function render(){

  const box=$("spot-list");
  if(!box) return;

  box.innerHTML="";

  filtered().forEach(s=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div>
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <small>${s.area||""} ${(s.types||[]).join(", ")}</small>
      </div>
    `;

    box.appendChild(div);
  });
}

/* bind */
function bind(){

  const search=document.getElementById("search");

  if(search){
    search.oninput=e=>{
      state.filter.k=e.target.value;
      render();
    };
  }
}

</script>
