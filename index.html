<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>種子島ガイド</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

/* ヘッダー */
header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:14px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

/* コンテンツ */
.container{
  padding:80px 10px 20px;
}

/* 入力 */
input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

/* ボタン */
button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:#e5e7eb;
  font-size:16px;
}

.row-btn{
  display:flex;
  gap:8px;
}

.row-btn button{
  flex:1;
}

/* タグ */
.tag-btn{
  padding:10px 14px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

/* カード */
.card{
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img{
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.card-content{
  flex:1;
}

.card h3{
  margin:0;
  font-size:18px;
}

/* 折りたたみ */
.toggle-btn{
  width:100%;
  background:#3b82f6;
  color:white;
}

.form-box{
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<button class="toggle-btn" onclick="toggleForm()">➕ スポット追加</button>

<div id="formBox" class="form-box">
  <div>エリア</div>
  <div id="area-buttons"></div>

  <div>種類タグ</div>
  <div id="type-buttons"></div>

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image">
  <img id="preview" style="display:none; width:100%; border-radius:10px;">

  <button onclick="saveSpot()">保存</button>
</div>

<input id="search" placeholder="検索">

<div class="row-btn">
  <button onclick="toggleFavFilter()">⭐</button>
  <button onclick="toggleMode()">AND/OR</button>
  <button onclick="exportData()">📤</button>
</div>

<div>
  <div>エリア</div>
  <div id="filter-area"></div>

  <div>種類タグ</div>
  <div id="filter-type"></div>
</div>

<div id="spot-list"></div>

</div>

<script>
const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","温泉","海岸","絶景","その他"];

let spots=JSON.parse(localStorage.getItem("spots"))||[];
let favorites=JSON.parse(localStorage.getItem("fav"))||[];

let selectedArea="", selectedTypes=[];
let filterArea="", filterTypes=[];
let showFavOnly=false, isAndMode=true;
let imageData="";

const areaButtons=document.getElementById("area-buttons");
const typeButtons=document.getElementById("type-buttons");
const filterAreaEl=document.getElementById("filter-area");
const filterTypeEl=document.getElementById("filter-type");
const spotList=document.getElementById("spot-list");

// 折りたたみ
function toggleForm(){
  formBox.style.display=formBox.style.display==="none"?"block":"none";
}

// ボタン生成
function createButtons(target,list,cb){
  list.forEach(item=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.innerText=item;
    b.onclick=()=>cb(item);
    target.appendChild(b);
  });
}

createButtons(areaButtons,AREAS,a=>{
  selectedArea = selectedArea===a?"":a;
  renderButtons();
});

createButtons(typeButtons,TYPES,t=>{
  selectedTypes.includes(t)
    ? selectedTypes=selectedTypes.filter(x=>x!==t)
    : selectedTypes.push(t);
  renderButtons();
});

createButtons(filterAreaEl,AREAS,a=>{
  filterArea = filterArea===a?"":a;
  renderButtons(); render();
});

createButtons(filterTypeEl,TYPES,t=>{
  filterTypes.includes(t)
    ? filterTypes=filterTypes.filter(x=>x!==t)
    : filterTypes.push(t);
  renderButtons(); render();
});

function renderButtons(){
  document.querySelectorAll(".tag-btn").forEach(btn=>{
    const t=btn.innerText;
    btn.classList.toggle("active",
      t===selectedArea ||
      selectedTypes.includes(t) ||
      t===filterArea ||
      filterTypes.includes(t)
    );
  });
}

// 画像
image.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    imageData=r.result;
    preview.src=r.result;
    preview.style.display="block";
  };
  r.readAsDataURL(f);
};

// 保存
function saveSpot(){
  if(!name.value.trim()) return alert("名前必須");

  spots.push({
    name:name.value,
    desc:desc.value,
    tags:[selectedArea,...selectedTypes].filter(Boolean),
    img:imageData
  });

  localStorage.setItem("spots",JSON.stringify(spots));
  render();
}

// 表示
function render(){
  const keyword=search.value.toLowerCase();
  spotList.innerHTML="";

  spots.filter(s=>{
    if(!s.name.toLowerCase().includes(keyword)) return false;
    if(filterArea && !s.tags.includes(filterArea)) return false;
    if(showFavOnly && !favorites.includes(s.name)) return false;

    if(filterTypes.length){
      if(isAndMode && !filterTypes.every(t=>s.tags.includes(t))) return false;
      if(!isAndMode && !filterTypes.some(t=>s.tags.includes(t))) return false;
    }
    return true;
  }).forEach(s=>{
    const fav=favorites.includes(s.name);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div class="card-content">
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <div style="font-size:12px;color:#666;">${s.tags.join(", ")}</div>
        <button onclick="toggleFavorite('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      </div>
    `;

    spotList.appendChild(d);
  });
}

// その他
function toggleFavorite(name){
  favorites.includes(name)
    ? favorites=favorites.filter(f=>f!==name)
    : favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  render();
}

function toggleMode(){
  isAndMode=!isAndMode;
  alert(isAndMode?"AND検索":"OR検索");
}

function exportData(){
  navigator.clipboard.writeText(JSON.stringify(spots,null,2));
  alert("コピーしたよ");
}

search.oninput=render;

renderButtons();
render();
</script>

</body>
</html>
