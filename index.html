<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>種子島スポット検索</title>

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:14px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

.container{
  padding:80px 10px 20px;
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:#e5e7eb;
  font-size:16px;
}

.row-btn{
  display:flex;
  gap:8px;
}

.row-btn button{ flex:1; }

.tag-btn{
  padding:10px 14px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
  cursor:pointer;
  user-select:none;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

.card{
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img{
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.card-content{ flex:1; }

.card h3{ margin:0; font-size:18px; }

.toggle-btn{
  width:100%;
  background:#3b82f6;
  color:white;
}

.form-box{
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島スポット検索</header>

<div class="container">

<button class="toggle-btn" onclick="toggleForm()">➕ スポット追加</button>

<div id="formBox" class="form-box">

  <div>エリア</div>
  <div id="area-buttons"></div>

  <div>種類タグ</div>
  <div id="type-buttons"></div>

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image">
  <img id="preview" style="display:none; width:100%; border-radius:10px;">

  <button onclick="saveSpot()">保存</button>
</div>

<input id="search" placeholder="検索">

<div class="row-btn">
  <button onclick="toggleFavFilter()">⭐</button>
  <button onclick="toggleMode()" id="modeBtn">AND検索</button>
  <button onclick="exportData()">📤</button>
</div>

<div>
  <div>エリア</div>
  <div id="filter-area"></div>

  <div>種類タグ</div>
  <div id="filter-type"></div>
</div>

<div id="spot-list"></div>

</div>

<script>

/* =========================
   タグ
========================= */
const AREAS=["北部","中部","南部"];

const TYPES=[
  "カフェ","レストラン","パン","ホテル","スーパー","ドラッグストア",
  "コンビニ","土産","個人商店","無人販売","レジャー","温泉","神社",
  "工場","博物館","公園","海岸","星空","宇宙","絶景","猫",
  "知人友人・親戚","その他"
];

/* =========================
   DOM
========================= */
const nameEl=document.getElementById("name");
const descEl=document.getElementById("desc");
const searchEl=document.getElementById("search");
const imageEl=document.getElementById("image");
const previewEl=document.getElementById("preview");

const areaButtons=document.getElementById("area-buttons");
const typeButtons=document.getElementById("type-buttons");
const filterAreaEl=document.getElementById("filter-area");
const filterTypeEl=document.getElementById("filter-type");
const spotList=document.getElementById("spot-list");
const formBox=document.getElementById("formBox");
const modeBtn=document.getElementById("modeBtn");

/* =========================
   状態
========================= */
let state={
  spots: JSON.parse(localStorage.getItem("spots")) || [],
  favorites: JSON.parse(localStorage.getItem("fav")) || [],

  form:{
    area:"",
    types:[],
    image:""
  },

  filter:{
    area:"",
    types:[],
    favOnly:false,
    mode:"AND",
    keyword:""
  }
};

/* =========================
   初期化
========================= */
init();

function init(){
  bind();
  createButtons();
  updateModeUI();
  render();
}

/* =========================
   イベント
========================= */
function bind(){
  searchEl.oninput=e=>{
    state.filter.keyword=e.target.value;
    render();
  };

  imageEl.onchange=handleImage;
}

/* =========================
   フォーム
========================= */
function toggleForm(){
  formBox.style.display =
    formBox.style.display==="block"?"none":"block";
}

/* =========================
   ボタン生成
========================= */
function createButtons(){
  make(area-buttons,AREAS,"area");
  make(type-buttons,TYPES,"type");
  make(filter-area,AREAS,"filterArea");
  make(filter-type,TYPES,"filterType");
}

function make(target,list,mode){
  list.forEach(item=>{
    const el=document.createElement("span");
    el.className="tag-btn";
    el.innerText=item;
    el.onclick=()=>handleTag(mode,item);
    target.appendChild(el);
  });
}

/* =========================
   タグ
========================= */
function handleTag(mode,item){

  if(mode==="area"){
    state.form.area = state.form.area===item?"":item;
  }

  if(mode==="type"){
    state.form.types.includes(item)
      ? state.form.types=state.form.types.filter(t=>t!==item)
      : state.form.types.push(item);
  }

  if(mode==="filterArea"){
    state.filter.area = state.filter.area===item?"":item;
  }

  if(mode==="filterType"){
    state.filter.types.includes(item)
      ? state.filter.types=state.filter.types.filter(t=>t!==item)
      : state.filter.types.push(item);
  }

  render();
}

/* =========================
   画像
========================= */
function handleImage(e){
  const f=e.target.files[0];
  if(!f) return;

  const r=new FileReader();
  r.onload=()=>{
    state.form.image=r.result;
    previewEl.src=r.result;
    previewEl.style.display="block";
  };
  r.readAsDataURL(f);
}

/* =========================
   保存
========================= */
function saveSpot(){
  if(!nameEl.value.trim()) return alert("名前必須");

  state.spots.push({
    name:nameEl.value,
    desc:descEl.value,
    tags:{
      area:state.form.area,
      types:state.form.types
    },
    img:state.form.image
  });

  localStorage.setItem("spots",JSON.stringify(state.spots));
  render();
}

/* =========================
   安全取得
========================= */
function getTypes(s){
  return Array.isArray(s.tags?.types) ? s.tags.types : [];
}

function getArea(s){
  return s.tags?.area || "";
}

/* =========================
   フィルター
========================= */
function filterData(){
  const k=state.filter.keyword.toLowerCase();

  return state.spots.filter(s=>{

    if(!s.name.toLowerCase().includes(k)) return false;

    if(state.filter.area &&
      getArea(s)!==state.filter.area) return false;

    const types=getTypes(s);

    if(state.filter.types.length){

      if(state.filter.mode==="AND"){
        if(!state.filter.types.every(t=>types.includes(t))) return false;
      }else{
        if(!state.filter.types.some(t=>types.includes(t))) return false;
      }
    }

    if(state.filter.favOnly &&
      !state.favorites.includes(s.name)) return false;

    return true;
  });
}

/* =========================
   モード表示（ここ変更ポイント）
========================= */
function toggleMode(){
  state.filter.mode = state.filter.mode==="AND"?"OR":"AND";
  updateModeUI();
  render();
}

function updateModeUI(){
  modeBtn.innerText =
    state.filter.mode==="AND"
      ? "AND検索"
      : "OR検索";
}

/* =========================
   active表示
========================= */
function updateActiveButtons(){
  document.querySelectorAll(".tag-btn").forEach(btn=>{
    const t=btn.innerText;

    const active =
      t===state.form.area ||
      t===state.filter.area ||
      state.form.types.includes(t) ||
      state.filter.types.includes(t);

    btn.classList.toggle("active",active);
  });
}

/* =========================
   描画
========================= */
function render(){

  updateActiveButtons();

  const list=filterData();
  spotList.innerHTML="";

  list.forEach(s=>{
    const fav=state.favorites.includes(s.name);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div class="card-content">
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <div style="font-size:12px;color:#666;">
          ${getArea(s)} ${(getTypes(s)).join(", ")}
        </div>
        <button onclick="toggleFavorite('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      </div>
    `;

    spotList.appendChild(d);
  });
}

/* =========================
   お気に入り
========================= */
function toggleFavorite(name){
  state.favorites.includes(name)
    ? state.favorites=state.favorites.filter(f=>f!==name)
    : state.favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(state.favorites));
  render();
}

/* =========================
   その他
========================= */
function toggleFavFilter(){
  state.filter.favOnly=!state.filter.favOnly;
  render();
}

function exportData(){
  navigator.clipboard.writeText(JSON.stringify(state.spots,null,2));
  alert("コピーしたよ");
}

</script>

</body>
</html>
