<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>種子島ガイド</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body { font-family:sans-serif; margin:0; background:#f2f4f7; }

header {
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
}

.container {
  padding:15px;
  max-width:600px;
  margin:auto;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  padding:10px 12px;
  border-radius:10px;
  margin:5px;
  border:none;
  cursor:pointer;
}

.row-btn {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tag-btn {
  display:inline-block;
  padding:8px 12px;
  margin:4px;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
  font-size:13px;
}

.tag-btn.active {
  background:#2563eb;
  color:white;
}

/* ⭐ 横カード */
.card {
  display:flex;
  gap:12px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  align-items:center;
}

/* 画像 */
.card img {
  width:110px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  flex-shrink:0;
}

/* テキスト */
.card-content {
  flex:1;
}

.card h3 {
  margin:0;
  font-size:16px;
}

/* 折りたたみ */
.toggle-btn {
  width:100%;
  background:#2563eb;
  color:white;
}

.form-box {
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<button class="toggle-btn" onclick="toggleForm()">➕ スポット追加</button>

<div id="formBox" class="form-box">

  <div>エリア</div>
  <div id="area-buttons"></div>

  <div>種類タグ</div>
  <div id="type-buttons"></div>

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image" accept="image/*">
  <img id="preview" style="display:none; width:100%; border-radius:10px;">

  <button onclick="saveSpot()">保存</button>
</div>

<input type="text" id="search" placeholder="検索...">

<div class="row-btn">
  <button onclick="toggleFavFilter()">⭐ お気に入り</button>
  <button onclick="toggleMode()">AND / OR</button>
  <button onclick="exportData()">📤</button>
</div>

<div>
  <div>エリア</div>
  <div id="filter-area"></div>

  <div>種類タグ</div>
  <div id="filter-type"></div>
</div>

<hr>

<div id="spot-list"></div>

</div>

<script>
const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","パン","ホテル","スーパー","ドラッグストア","コンビニ","土産","個人商店","無人販売","港","空港","レンタカー","レジャー","温泉","神社","工場","家畜","公園","海岸","星空","宇宙","博物館","絶景","猫","知人友人・親戚","その他"];

let spots=JSON.parse(localStorage.getItem("spots"))||[];
let favorites=JSON.parse(localStorage.getItem("fav"))||[];

let selectedArea="", selectedTypes=[];
let filterArea="", filterTypes=[];
let showFavOnly=false, isAndMode=true;
let imageData="";

// DOM
const formBox=document.getElementById("formBox");
const areaButtons=document.getElementById("area-buttons");
const typeButtons=document.getElementById("type-buttons");
const filterAreaEl=document.getElementById("filter-area");
const filterTypeEl=document.getElementById("filter-type");
const spotList=document.getElementById("spot-list");

const nameInput=document.getElementById("name");
const descInput=document.getElementById("desc");
const searchInput=document.getElementById("search");
const imageInput=document.getElementById("image");
const preview=document.getElementById("preview");

// 折りたたみ
function toggleForm(){
  formBox.style.display = formBox.style.display==="none" ? "block" : "none";
}

// ボタン生成
function createButtons(target, list, callback){
  list.forEach(item=>{
    const btn=document.createElement("span");
    btn.className="tag-btn";
    btn.innerText=item;
    btn.onclick=()=>callback(item);
    target.appendChild(btn);
  });
}

// 生成
createButtons(areaButtons, AREAS, a=>{
  selectedArea = selectedArea===a?"":a;
  renderButtons();
});

createButtons(typeButtons, TYPES, t=>{
  selectedTypes.includes(t)
    ? selectedTypes=selectedTypes.filter(x=>x!==t)
    : selectedTypes.push(t);
  renderButtons();
});

createButtons(filterAreaEl, AREAS, a=>{
  filterArea = filterArea===a?"":a;
  renderButtons(); render();
});

createButtons(filterTypeEl, TYPES, t=>{
  filterTypes.includes(t)
    ? filterTypes=filterTypes.filter(x=>x!==t)
    : filterTypes.push(t);
  renderButtons(); render();
});

// ボタン状態
function renderButtons(){
  document.querySelectorAll(".tag-btn").forEach(btn=>{
    const t=btn.innerText;
    btn.classList.toggle("active",
      t===selectedArea ||
      selectedTypes.includes(t) ||
      t===filterArea ||
      filterTypes.includes(t)
    );
  });
}

// 画像
imageInput.addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    imageData=reader.result;
    preview.src=imageData;
    preview.style.display="block";
  };
  reader.readAsDataURL(file);
});

// 保存
function saveSpot(){
  const name=nameInput.value.trim();
  if(!name) return alert("名前必須");

  const tags=[selectedArea,...selectedTypes].filter(Boolean);

  spots.push({
    name,
    desc:descInput.value,
    tags,
    img:imageData
  });

  localStorage.setItem("spots",JSON.stringify(spots));

  clearForm();
  render();
}

// 表示
function render(){
  const keyword=searchInput.value.toLowerCase();
  spotList.innerHTML="";

  spots.filter(s=>{
    if(!s.name.toLowerCase().includes(keyword)) return false;
    if(filterArea && !s.tags.includes(filterArea)) return false;
    if(showFavOnly && !favorites.includes(s.name)) return false;

    if(filterTypes.length){
      if(isAndMode && !filterTypes.every(t=>s.tags.includes(t))) return false;
      if(!isAndMode && !filterTypes.some(t=>s.tags.includes(t))) return false;
    }
    return true;
  }).forEach(s=>{
    const fav=favorites.includes(s.name);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${s.img ? `<img src="${s.img}">` : ""}

      <div class="card-content">
        <h3>${s.name}</h3>
        <div style="font-size:13px; color:#444;">${s.desc||""}</div>
        <div style="font-size:12px; color:#777;">
          ${s.tags.join(", ")}
        </div>

        <button onclick="toggleFavorite('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      </div>
    `;

    spotList.appendChild(div);
  });
}

// その他
function toggleFavorite(name){
  favorites.includes(name)
    ? favorites=favorites.filter(f=>f!==name)
    : favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  render();
}

function toggleMode(){
  isAndMode=!isAndMode;
  alert(isAndMode?"AND検索":"OR検索");
  render();
}

function exportData(){
  navigator.clipboard.writeText(JSON.stringify(spots,null,2));
  alert("コピーしたよ");
}

function clearForm(){
  nameInput.value="";
  descInput.value="";
  imageInput.value="";
  preview.style.display="none";
  selectedArea="";
  selectedTypes=[];
  imageData="";
  renderButtons();
}

// 初期化
searchInput.addEventListener("input",render);

renderButtons();
render();
</script>

</body>
</html>
