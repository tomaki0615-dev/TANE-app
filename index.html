<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>種子島の見どころ</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f9fafb;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid #ddd;
}

.tabs{
  display:flex;
  position:fixed;
  top:44px;
  width:100%;
  background:white;
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
}

.tab.active{
  background:#3b82f6;
  color:white;
}

.container{
  padding:100px 10px;
}

.card{
  display:flex;
  gap:10px;
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
}

.card img{
  width:90px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.right{
  margin-left:auto;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.tag-btn{
  padding:6px 10px;
  margin:2px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

.on{
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<header>🌴 種子島の見どころ</header>

<div class="tabs">
  <div class="tab active" onclick="tab('search')">検索</div>
  <div class="tab" onclick="tab('add')">追加</div>
</div>

<div class="container">

<div id="searchPage">
<input id="search" placeholder="検索">

<button onclick="toggleFav()">お気に入り</button>
<button onclick="exportData()">エクスポート</button>

<div id="spot-list"></div>
</div>

<div id="addPage" style="display:none;">
<input id="name" placeholder="名前">
<textarea id="desc"></textarea>
<button onclick="save()">保存</button>
</div>

</div>

<script>

/* ===== 初回データ投入 ===== */
const DEFAULT_DATA = /* ←ここにあなたのJSONそのまま入れてOK */ 
JSON.parse(`{
  "spots": ${JSON.stringify({}).replace('{}','[]')}
}`);

if(!localStorage.getItem("spots")){
  localStorage.setItem("spots", JSON.stringify(${JSON.stringify(this?.spots || [])}));
  localStorage.setItem("fav", JSON.stringify(${JSON.stringify(this?.fav || [])}));
}

/* ===== 状態 ===== */
let spots = JSON.parse(localStorage.getItem("spots")) || [];
let fav = JSON.parse(localStorage.getItem("fav")) || [];

const list = document.getElementById("spot-list");

/* ===== 描画 ===== */
function render(){
  list.innerHTML="";
  spots.forEach((s,i)=>{

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div>
        <b>${s.name}</b>
        <div>${s.desc||""}</div>
      </div>
      <div class="right">
        <button onclick="toggleFavItem('${s.name}')">
          ${fav.includes(s.name)?"⭐":"☆"}
        </button>
        <button onclick="edit(${i})">編集</button>
        <button onclick="del(${i})">削除</button>
      </div>
    `;

    list.appendChild(d);
  });
}

/* ===== 機能 ===== */
function toggleFavItem(name){
  fav.includes(name)
    ? fav=fav.filter(f=>f!==name)
    : fav.push(name);

  localStorage.setItem("fav",JSON.stringify(fav));
  render();
}

function save(){
  const s={
    name:document.getElementById("name").value,
    desc:document.getElementById("desc").value
  };
  spots.push(s);
  localStorage.setItem("spots",JSON.stringify(spots));
  render();
}

function del(i){
  spots.splice(i,1);
  localStorage.setItem("spots",JSON.stringify(spots));
  render();
}

function edit(i){
  const s=spots[i];
  document.getElementById("name").value=s.name;
  document.getElementById("desc").value=s.desc;
}

function exportData(){
  const data={spots,fav};
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.json";
  a.click();
}

/* ===== タブ ===== */
function tab(t){
  document.getElementById("searchPage").style.display=t==="search"?"block":"none";
  document.getElementById("addPage").style.display=t==="add"?"block":"none";
}

render();

</script>

</body>
</html>
