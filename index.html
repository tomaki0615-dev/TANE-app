<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- ⭐ これ超重要 -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>種子島ガイド</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

/* ヘッダー */
header {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:14px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

/* コンテンツ */
.container {
  padding:70px 10px 80px;
}

/* 入力 */
input, textarea {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

/* ボタン */
button {
  padding:14px;
  border-radius:14px;
  border:none;
  background:#e5e7eb;
  font-size:16px;
}

/* 下バー */
.bottom-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top:1px solid #ddd;
  display:flex;
}

.bottom-bar button {
  flex:1;
  background:none;
  font-weight:bold;
}

/* カード */
.card {
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img {
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.card-content h3 {
  margin:0;
  font-size:18px;
}

.card-content div {
  font-size:14px;
}

/* タグ */
.tag-btn {
  padding:8px 12px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
}

.tag-btn.active {
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド</header>

<div class="container">

<input id="search" placeholder="検索">

<div id="spot-list"></div>

</div>

<!-- 下タブ -->
<div class="bottom-bar">
  <button onclick="toggleFav()">⭐</button>
  <button onclick="exportData()">📤</button>
</div>

<script>
let spots=JSON.parse(localStorage.getItem("spots"))||[];
let favorites=JSON.parse(localStorage.getItem("fav"))||[];
let showFav=false;

function render(){
  const keyword=search.value.toLowerCase();
  spot-list.innerHTML="";

  spots.filter(s=>{
    if(!s.name.toLowerCase().includes(keyword)) return false;
    if(showFav && !favorites.includes(s.name)) return false;
    return true;
  }).forEach(s=>{
    const fav=favorites.includes(s.name);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div class="card-content">
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <button onclick="toggleFavorite('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      </div>
    `;

    document.getElementById("spot-list").appendChild(div);
  });
}

function toggleFavorite(name){
  favorites.includes(name)
    ? favorites=favorites.filter(f=>f!==name)
    : favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

function toggleFav(){
  showFav=!showFav;
  render();
}

function exportData(){
  navigator.clipboard.writeText(JSON.stringify(spots,null,2));
  alert("コピーしたよ");
}

search.addEventListener("input",render);
render();
</script>

</body>
</html>
