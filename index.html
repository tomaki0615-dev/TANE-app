<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>種子島ガイド（リファクタ版）</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f9fafb;
  font-size:17px;
}

/* ヘッダー */
header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
  padding:14px;
  text-align:center;
  font-weight:bold;
  z-index:1000;
}

.container{
  padding:80px 10px 20px;
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:#e5e7eb;
  font-size:16px;
}

.row-btn{
  display:flex;
  gap:8px;
}

.row-btn button{ flex:1; }

.tag-btn{
  padding:10px 14px;
  margin:4px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
  cursor:pointer;
}

.tag-btn.active{
  background:#3b82f6;
  color:white;
}

.card{
  display:flex;
  gap:10px;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card img{
  width:100px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.card-content{ flex:1; }

.card h3{
  margin:0;
  font-size:18px;
}

.toggle-btn{
  width:100%;
  background:#3b82f6;
  color:white;
}

.form-box{
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>🌴 種子島ガイド（リファクタ）</header>

<div class="container">

<button class="toggle-btn" onclick="ui.toggleForm()">➕ スポット追加</button>

<div id="formBox" class="form-box">
  <div>エリア</div>
  <div id="area-buttons"></div>

  <div>種類タグ</div>
  <div id="type-buttons"></div>

  <input id="name" placeholder="名前">
  <textarea id="desc" placeholder="説明"></textarea>

  <input type="file" id="image">
  <img id="preview" style="display:none; width:100%; border-radius:10px;">

  <button onclick="app.saveSpot()">保存</button>
</div>

<input id="search" placeholder="検索">

<div class="row-btn">
  <button onclick="app.toggleFavFilter()">⭐</button>
  <button onclick="app.toggleMode()">AND/OR</button>
  <button onclick="app.exportData()">📤</button>
</div>

<div>
  <div>エリア</div>
  <div id="filter-area"></div>

  <div>種類タグ</div>
  <div id="filter-type"></div>
</div>

<div id="spot-list"></div>

</div>

<script>
/* =========================
   データ定義
========================= */
const AREAS=["北部","中部","南部"];
const TYPES=["カフェ","レストラン","温泉","海岸","絶景","その他"];

/* =========================
   状態（完全統合）
========================= */
const state = {
  spots: JSON.parse(localStorage.getItem("spots")) || [],
  favorites: JSON.parse(localStorage.getItem("fav")) || [],

  form: {
    area: "",
    types: [],
    image: ""
  },

  filter: {
    area: "",
    types: [],
    favOnly: false,
    mode: "AND",
    keyword: ""
  }
};

/* =========================
   UI系（DOM専用）
========================= */
const ui = {
  formBox: document.getElementById("formBox"),

  toggleForm(){
    this.formBox.style.display =
      this.formBox.style.display === "block" ? "none" : "block";
  }
};

/* =========================
   アプリ本体
========================= */
const app = {

init(){
  this.bind();
  this.createButtons();
  this.render();
},

bind(){
  search.oninput = (e)=>{
    state.filter.keyword = e.target.value;
    this.render();
  };

  image.onchange = this.handleImage;
},

/* --- ボタン生成（完全分離） --- */
createButtons(){
  this.makeTagButtons(areaButtons, AREAS, "area");
  this.makeTagButtons(typeButtons, TYPES, "type");
  this.makeTagButtons(filterArea, AREAS, "filterArea");
  this.makeTagButtons(filterType, TYPES, "filterType");
},

makeTagButtons(target, list, mode){
  list.forEach(item=>{
    const b=document.createElement("span");
    b.className="tag-btn";
    b.innerText=item;

    b.onclick=()=>{
      this.handleTagClick(mode, item);
    };

    target.appendChild(b);
  });
},

handleTagClick(mode, item){

  if(mode==="area"){
    state.form.area = state.form.area===item ? "" : item;
  }

  if(mode==="type"){
    state.form.types.includes(item)
      ? state.form.types = state.form.types.filter(x=>x!==item)
      : state.form.types.push(item);
  }

  if(mode==="filterArea"){
    state.filter.area = state.filter.area===item ? "" : item;
  }

  if(mode==="filterType"){
    state.filter.types.includes(item)
      ? state.filter.types = state.filter.types.filter(x=>x!==item)
      : state.filter.types.push(item);
  }

  this.render();
},

/* --- 画像 --- */
handleImage(e){
  const f=e.target.files[0];
  if(!f) return;

  const r=new FileReader();
  r.onload=()=>{
    state.form.image = r.result;
    preview.src = r.result;
    preview.style.display="block";
  };
  r.readAsDataURL(f);
},

/* --- 保存 --- */
saveSpot(){
  if(!name.value.trim()) return alert("名前必須");

  state.spots.push({
    name:name.value,
    desc:desc.value,
    tags:[state.form.area,...state.form.types].filter(Boolean),
    img:state.form.image
  });

  localStorage.setItem("spots",JSON.stringify(state.spots));
  this.render();
},

/* --- フィルター --- */
filterData(){
  const k = state.filter.keyword.toLowerCase();

  return state.spots.filter(s=>{

    if(!s.name.toLowerCase().includes(k)) return false;

    if(state.filter.area && !s.tags.includes(state.filter.area))
      return false;

    if(state.filter.favOnly && !state.favorites.includes(s.name))
      return false;

    if(state.filter.types.length){
      if(state.filter.mode==="AND" &&
        !state.filter.types.every(t=>s.tags.includes(t))) return false;

      if(state.filter.mode==="OR" &&
        !state.filter.types.some(t=>s.tags.includes(t))) return false;
    }

    return true;
  });
},

/* --- 描画（一本化） --- */
render(){
  const list = this.filterData();
  spotList.innerHTML="";

  list.forEach(s=>{
    const fav = state.favorites.includes(s.name);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      ${s.img?`<img src="${s.img}">`:""}
      <div class="card-content">
        <h3>${s.name}</h3>
        <div>${s.desc||""}</div>
        <div style="font-size:12px;color:#666;">
          ${s.tags.join(", ")}
        </div>
        <button onclick="app.toggleFav('${s.name}')">
          ${fav?"⭐":"☆"}
        </button>
      </div>
    `;

    spotList.appendChild(d);
  });
},

/* --- お気に入り --- */
toggleFav(name){
  state.favorites.includes(name)
    ? state.favorites = state.favorites.filter(f=>f!==name)
    : state.favorites.push(name);

  localStorage.setItem("fav",JSON.stringify(state.favorites));
  this.render();
},

/* --- その他 --- */
toggleFavFilter(){
  state.filter.favOnly = !state.filter.favOnly;
  this.render();
},

toggleMode(){
  state.filter.mode = state.filter.mode==="AND"?"OR":"AND";
  alert(state.filter.mode);
},

exportData(){
  navigator.clipboard.writeText(JSON.stringify(state.spots,null,2));
  alert("コピーしたよ");
}

};

/* 起動 */
app.init();
</script>

</body>
</html>
